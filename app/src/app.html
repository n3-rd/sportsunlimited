<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Favicons -->
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="manifest" href="/site.webmanifest" />
		
		<!-- DNS Prefetch for performance -->
		<link rel="dns-prefetch" href="https://fonts.googleapis.com" />
		<link rel="dns-prefetch" href="https://fonts.gstatic.com" />
		<link rel="dns-prefetch" href="https://www.googletagmanager.com" />
		
		<!-- Preconnect for critical resources -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		
		<!-- Critical Font Preload -->
		<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Inter:wght@400;500;600;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		
		<!-- Meta tags for security and compatibility -->
		<meta name="format-detection" content="telephone=no" />
		<meta name="theme-color" content="#ffffff" />
		<meta name="msapplication-TileColor" content="#ffffff" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />

        <!-- Default SEO (can be overridden by pages) -->
        <meta name="description" content="Get the latest Nigerian sports news on Football, NPFL, Basketball, Athletics, and more. Your premier destination for sports updates." />
        <meta name="keywords" content="Nigerian sports, NPFL, Football, Basketball, Athletics, Sports News Nigeria" />
        <meta name="author" content="Sports Unlimited" />

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Sports Unlimited" />
        <meta property="og:locale" content="en_NG" />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@SportsUnlimited" />
		
		<!-- propeller ads -->
		<!-- <meta name="monetag" content="d16210c3fd266ee107a9d11e753e7892"> -->

		<!-- Google Search Console Verification -->
		<!-- <meta name="google-site-verification" content="google13bb987efc6ba862" /> -->
		<meta name="google-site-verification" content="DzylDVJ8H6MuVCJnv4VaRyDnEUktry2F42cvMKF3tjc">

		<!-- Sitemap -->
		<link rel="sitemap" type="application/xml" href="/sitemap.xml" />

		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y4NBZCC8HQ"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag('js', new Date());
			gtag('config', 'G-Y4NBZCC8HQ');
		</script>

		<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3810788597906222"
		crossorigin="anonymous"></script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
